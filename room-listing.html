<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Room Listings</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --ink: #1a1410;
      --muted: #8a7f72;
      --accent: #c8401a;
      --accent2: #2a5c3f;
      --card: #fff;
      --border: #ddd5c8;
      --display: 'Bebas Neue', sans-serif;
      --body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--body);
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: var(--ink);
      color: var(--bg);
      padding: 32px 48px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .header-left h1 {
      font-family: var(--display);
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.9;
      letter-spacing: 2px;
    }
    .header-left h1 span { color: var(--accent); }
    .header-left p {
      font-size: 13px;
      color: #888;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .sync-info {
      font-size: 11px;
      color: #666;
      letter-spacing: 1px;
      font-family: monospace;
    }
    .sync-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #666;
      margin-right: 6px;
      vertical-align: middle;
    }
    .sync-dot.live { background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* TOOLBAR */
    .toolbar {
      padding: 20px 48px;
      background: var(--ink);
      border-top: 1px solid #333;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #f0f0f0;
      font-family: var(--body);
      font-size: 14px;
      padding: 10px 16px 10px 36px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: '⌕';
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #666;
      font-size: 16px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid #444;
      color: #aaa;
      font-family: var(--body);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .count {
      font-family: monospace;
      font-size: 12px;
      color: #666;
      margin-left: auto;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      padding: 0;
    }

    /* CARD */
    .card {
      background: var(--card);
      padding: 28px;
      cursor: pointer;
      transition: background 0.15s;
      animation: fadeUp 0.4s ease both;
      position: relative;
      overflow: hidden;
    }
    .card:hover { background: #faf7f2; }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s;
      transform-origin: bottom;
    }
    .card:hover::before { transform: scaleY(1); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .room-num {
      font-family: var(--display);
      font-size: 3rem;
      line-height: 1;
      color: var(--border);
    }
    .availability {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
    }
    .availability.available { background: #e8f5e9; color: var(--accent2); }
    .availability.not-available { background: #fce8e8; color: var(--accent); }

    .card-name {
      font-family: var(--display);
      font-size: 1.6rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
      line-height: 1.1;
    }
    .card-address {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .meta-item { }
    .meta-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .meta-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
    }
    .meta-value.price {
      font-family: var(--display);
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .tag {
      font-size: 10px;
      background: var(--bg);
      color: var(--muted);
      padding: 3px 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* EMPTY */
    .empty {
      grid-column: 1/-1;
      padding: 80px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .empty big {
      display: block;
      font-family: var(--display);
      font-size: 4rem;
      color: var(--border);
      margin-bottom: 8px;
    }

    /* LOADING */
    .loading-screen {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-bar {
      width: 200px; height: 2px;
      background: var(--border);
      overflow: hidden;
    }
    .loading-bar::after {
      content: '';
      display: block;
      width: 40%;
      height: 100%;
      background: var(--accent);
      animation: slide 1s infinite;
    }
    @keyframes slide {
      from { transform: translateX(-100%); }
      to { transform: translateX(350%); }
    }
    .loading-text {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ERROR */
    .error-box {
      margin: 48px;
      padding: 24px;
      border: 1px solid #f5c6c6;
      background: #fff5f5;
      color: var(--accent);
      font-size: 13px;
      font-family: monospace;
    }

    @media (max-width: 600px) {
      .header, .toolbar { padding: 20px 20px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>ROOM<br><span>LISTINGS</span></h1>
    <p>Vancouver · Furnished Rooms</p>
  </div>
  <div class="header-right">
    <div class="sync-info">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-text">Carregando...</span>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar por nome, área, estação..." oninput="renderCards()"/>
  </div>
  <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('available', this)">Disponíveis</button>
  <button class="filter-btn" onclick="setFilter('not-available', this)">Indisponíveis</button>
  <span class="count" id="count"></span>
</div>

<div id="main"></div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbxq3pKJtBwLvktNBh5S9KuTwDJp_88_vg_QUbUBZFxY9qszUiAjRJ6Jpm6g0OWfIlCF/exec';
  const CACHE_KEY = 'room_data';
  const CACHE_TIME = 24 * 60 * 60 * 1000;

  let allData = [];
  let activeFilter = 'all';

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards();
  }

  function fmt(val) {
    if (!val) return '—';
    const n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
    if (isNaN(n)) return val;
    return '$' + n.toLocaleString('en-CA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function isAvailable(row) {
    const val = String(row['available'] || row['Available'] || '').toLowerCase();
    return val === 'available' || val === 'yes' || val === 'true';
  }

  function renderCards() {
    const search = document.getElementById('search').value.toLowerCase();
    const main = document.getElementById('main');

    let filtered = allData.filter(row => {
      const text = Object.values(row).join(' ').toLowerCase();
      const matchSearch = !search || text.includes(search);
      const avail = isAvailable(row);
      const matchFilter =
        activeFilter === 'all' ||
        (activeFilter === 'available' && avail) ||
        (activeFilter === 'not-available' && !avail);
      return matchSearch && matchFilter;
    });

    document.getElementById('count').textContent = `${filtered.length} quartos`;

    if (filtered.length === 0) {
      main.innerHTML = `<div class="grid"><div class="empty"><big>0</big>Nenhum quarto encontrado</div></div>`;
      return;
    }

    const cards = filtered.map((row, i) => {
      const avail = isAvailable(row);
      const name = row['Name (site)'] || row['name'] || '—';
      const room = row['Room'] || row['room'] || '';
      const address = row['C'] || row['address'] || '';
      const area = row['Area'] || row['area'] || '';
      const station = row['Nearest station'] || '';
      const rent = row['Monthly Rent'] || row['monthly_rent'] || '';
      const deposit = row['Deposit'] || row['deposit'] || '';
      const moveIn = row['Move-in date'] || row['move_in_date'] || '';
      const couples = row['Couples move-in'] || '';
      const parking = row['Parking'] || '';

      const tags = [area, couples ? '👫 Casais' : '', parking === 'available' ? '🚗 Parking' : '']
        .filter(Boolean)
        .map(t => `<span class="tag">${t}</span>`)
        .join('');

      return `
        <div class="card" style="animation-delay:${i * 30}ms">
          <div class="card-top">
            <div class="room-num">${room || '—'}</div>
            <span class="availability ${avail ? 'available' : 'not-available'}">
              ${avail ? 'Disponível' : 'Indisponível'}
            </span>
          </div>
          <div class="card-name">${name}</div>
          <div class="card-address">${address}</div>
          <div class="card-meta">
            <div class="meta-item">
              <div class="meta-label">Aluguel/mês</div>
              <div class="meta-value price">${fmt(rent)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Depósito</div>
              <div class="meta-value">${fmt(deposit)}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Entrada</div>
              <div class="meta-value">${moveIn || '—'}</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Estação</div>
              <div class="meta-value">${station || '—'}</div>
            </div>
          </div>
          <div class="card-footer">${tags}</div>
        </div>`;
    }).join('');

    main.innerHTML = `<div class="grid">${cards}</div>`;
  }

  function setSyncStatus(text, live = false) {
    document.getElementById('sync-text').textContent = text;
    document.getElementById('sync-dot').className = 'sync-dot' + (live ? ' live' : '');
  }

  // JSONP — contorna CORS sem proxy
  function fetchJSONP(url) {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now();
      const script = document.createElement('script');
      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error('Timeout'));
      }, 10000);

      function cleanup() {
        clearTimeout(timeout);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      window[cbName] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error('Script error')); };
      script.src = url + '?callback=' + cbName;
      document.head.appendChild(script);
    });
  }

  // Fetch normal com fallback para JSONP
  async function fetchData(forceRefresh = false) {
    const cached = localStorage.getItem(CACHE_KEY);
    const cachedTime = localStorage.getItem(CACHE_KEY + '_time');
    const cacheValid = cached && cachedTime && (Date.now() - Number(cachedTime)) < CACHE_TIME;

    if (!forceRefresh && cacheValid) {
      allData = JSON.parse(cached);
      const age = new Date(Number(cachedTime)).toLocaleTimeString('pt-BR');
      setSyncStatus(`Cache de ${age}`, false);
      renderCards();
      return;
    }

    document.getElementById('main').innerHTML = `
      <div class="loading-screen">
        <div class="loading-bar"></div>
        <div class="loading-text">Carregando dados...</div>
      </div>`;
    setSyncStatus('Sincronizando...', false);

    let data = null;

    // Tenta fetch normal primeiro
    try {
      const res = await fetch(API + '?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch(e1) {
      // Fallback: JSONP
      try {
        data = await fetchJSONP(API);
      } catch(e2) {
        // Último recurso: proxy
        try {
          const proxy = 'https://corsproxy.io/?' + encodeURIComponent(API);
          const res = await fetch(proxy);
          data = await res.json();
        } catch(e3) {
          document.getElementById('main').innerHTML =
            `<div class="error-box">✗ Erro ao carregar dados.<br><br>
            Verifique se a implantação está configurada como:<br>
            • Executar como: <b>Eu</b><br>
            • Quem pode acessar: <b>Qualquer pessoa</b><br><br>
            Erro: ${e3.message}</div>`;
          setSyncStatus('Erro na sincronização', false);
          return;
        }
      }
    }

    allData = Array.isArray(data) ? data : [];
    localStorage.setItem(CACHE_KEY, JSON.stringify(allData));
    localStorage.setItem(CACHE_KEY + '_time', Date.now());
    setSyncStatus(`Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`, true);
    renderCards();
  }

  // Atualiza 1x por dia
  fetchData();
  setInterval(() => fetchData(true), 24 * 60 * 60 * 1000);
</script>
</body>
</html>
